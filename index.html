*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --periwinkle: #989bbe;
  --mauve: #958a9d;
  --peach: #ffb988;
  --rose: #e2aca4;
  --coral: #fa9a89;
  --butter: #fff0a2;
  --dark: #989bbe;
  --dark-mid: #2a1f35;
  --light: #fdf8f4;
}

html, body {
  height: 100%;
}

body {
  font-family: 'ClashDisplay', sans-serif;
  background: #989bbe;
  color: var(--light);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow-x: hidden;
}

/* Atmospheric background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse 100% 60% at 50% 100%, rgba(255,154,137,0.9) 0%, rgba(255,185,136,0.6) 30%, transparent 65%),
    radial-gradient(ellipse 80% 50% at 50% 100%, rgba(250,154,137,0.5) 0%, transparent 55%),
    linear-gradient(175deg, #989bbe 0%, #8a7eaa 30%, #7d6b9e 55%, #c4785a 80%, #d4693a 100%);
  z-index: 0;
}

/* Grain overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
  opacity: 0.5;
}

/* Floating orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 2;
}
.orb-1 {
  width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(255,185,136,0.13) 0%, transparent 70%);
  bottom: -80px; left: -100px;
  animation: float 9s ease-in-out infinite;
}
.orb-2 {
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(152,139,190,0.11) 0%, transparent 70%);
  top: 40px; right: -50px;
  animation: float 11s ease-in-out infinite;
  animation-delay: -4s;
}
.orb-3 {
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(255,240,162,0.07) 0%, transparent 70%);
  top: 45%; left: 3%;
  animation: float 13s ease-in-out infinite;
  animation-delay: -7s;
}

@keyframes float {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-18px) scale(1.04); }
}

/* Main container */
.container {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 60px 24px 80px;
  max-width: 560px;
  width: 100%;
}

/* Staggered animations */
.anim { opacity: 0; animation: fadeUp 1s ease forwards; }
.anim-1 { animation-delay: 0.1s; }
.anim-2 { animation-delay: 0.3s; }
.anim-3 { animation-delay: 0.5s; }
.anim-4 { animation-delay: 0.65s; }
.anim-5 { animation-delay: 0.8s; }
.anim-6 { animation-delay: 1.0s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}


.logo-img svg {
  width: 160px;
  height: 160px;
  display: block;
}

/* Eyebrow */
.eyebrow {
  font-family: 'ClashDisplay', sans-serif;
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: rgba(253,248,244,0.9);
  margin-bottom: 20px;
}

/* Main headline — Nyght Serif for the brand name */
.brand-name {
  font-family: 'NyghtSerif', serif;
  font-weight: 400;
  font-style: italic;
  font-size: clamp(52px, 10vw, 82px);
  line-height: 1.0;
  letter-spacing: -0.01em;
  background: linear-gradient(135deg, var(--butter) 0%, var(--peach) 55%, var(--rose) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 20px;
}

/* Subhead — ClashDisplay light */
.subhead {
  font-family: 'ClashDisplay', sans-serif;
  font-weight: 300;
  font-size: clamp(14px, 2.2vw, 17px);
  line-height: 1.75;
  color: rgba(253,248,244,0.85);
  max-width: 400px;
  margin: 0 auto 48px;
  letter-spacing: 0.01em;
  text-align: center;
}

/* Form */
.form-wrap {
  width: 100%;
  max-width: 420px;
}

.form-label {
  font-family: 'ClashDisplay', sans-serif;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(253,248,244,0.7);
  display: block;
  margin-bottom: 14px;
  text-align: left;
}

.form-row {
  display: flex;
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 2px;
  overflow: hidden;
  background: rgba(255,255,255,0.04);
  transition: border-color 0.3s ease;
}
.form-row:focus-within {
  border-color: rgba(255,240,162,0.45);
  background: rgba(255,255,255,0.06);
}

.form-input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 15px 20px;
  font-family: 'ClashDisplay', sans-serif;
  font-weight: 300;
  font-size: 14px;
  color: var(--light);
  outline: none;
  letter-spacing: 0.02em;
  min-width: 0;
}
.form-input::placeholder { color: rgba(253,248,244,0.25); }

.form-btn {
  background: linear-gradient(135deg, var(--peach) 0%, var(--coral) 100%);
  border: none;
  padding: 15px 26px;
  font-family: 'ClashDisplay', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dark);
  cursor: pointer;
  transition: all 0.3s ease;
  white-space: nowrap;
  flex-shrink: 0;
}
.form-btn:hover {
  background: linear-gradient(135deg, var(--butter) 0%, var(--peach) 100%);
}

/* Success */
.success-msg {
  display: none;
  font-family: 'NyghtSerif', serif;
  font-style: italic;
  font-size: 16px;
  color: var(--butter);
  margin-top: 18px;
  letter-spacing: 0.02em;
  line-height: 1.6;
}
.success-msg.visible { display: block; animation: fadeUp 0.6s ease forwards; }

/* Privacy */
.privacy {
  font-family: 'ClashDisplay', sans-serif;
  font-weight: 200;
  font-size: 11px;
  color: rgba(253,248,244,0.5);
  margin-top: 14px;
  letter-spacing: 0.06em;
}

/* Bottom tagline */
.tagline {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'ClashDisplay', sans-serif;
  font-weight: 200;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(253,248,244,0.4);
  z-index: 10;
  white-space: nowrap;
  animation: fadeUp 1.4s ease forwards 1.2s;
  opacity: 0;
}

/* Mobile */
@media (max-width: 480px) {
  
  .form-row { flex-direction: column; }
  .form-btn { padding: 14px; text-align: center; }
  .container { padding: 40px 20px 80px; }
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="container">
  </div>

  <p class="eyebrow anim anim-2">Coming Soon</p>

  <h1 class="brand-name anim anim-3">Afterwards</h1>

  <p class="subhead anim anim-4">Built for the afterwards nobody prepares you for.<br><br>Grief and community care.</p>

  <div class="form-wrap anim anim-5">
    <label class="form-label" for="email-input">Be the first to know when we open our doors</label>
    <div class="form-row">
      <input
        class="form-input"
        id="email-input"
        type="email"
        placeholder="your@email.com"
        autocomplete="email"
      >
      <button class="form-btn" onclick="handleSignup()">Join the list</button>
    </div>
    <p class="success-msg" id="success-msg">You're on the list. We'll be in touch. 🤍</p>
    <p class="privacy">No spam. Just the things that matter.</p>
  </div>

</div>

<p class="tagline">grief support · made real · theafterwards.co</p>

<script>
  function handleSignup() {
    const input = document.getElementById('email-input');
    const email = input.value.trim();
    if (!email || !email.includes('@')) {
      input.style.color = 'rgba(250,154,137,0.8)';
      input.placeholder = 'please enter a valid email';
      input.focus();
      setTimeout(() => {
        input.style.color = '';
        input.placeholder = 'your@email.com';
      }, 2000);
      return;
    }
    const emails = JSON.parse(localStorage.getItem('afterwards_emails') || '[]');
    emails.push({ email, date: new Date().toISOString() });
    localStorage.setItem('afterwards_emails', JSON.stringify(emails));
    input.value = '';
    document.querySelector('.form-row').style.opacity = '0.4';
    document.querySelector('.form-btn').disabled = true;
    document.getElementById('success-msg').classList.add('visible');
  }

  document.getElementById('email-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSignup();
  });
</script>

</body>
</html>
